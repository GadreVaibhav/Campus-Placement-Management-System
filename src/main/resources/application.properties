# 1. Database Connection URL (Points to your local machine on port 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/placement_portal?createDatabaseIfNotExist=true

# 2. Your MySQL Login Credentials
# CHANGE 'root' and 'YOUR_PASSWORD' to match your actual MySQL settings!
spring.datasource.username=root
spring.datasource.password=Laptop

# 3. Hibernate Configuration (Automatically updates tables if we change Java code)
# Change this line
# Change this to 'update'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. Change the server port to avoid conflicts
server.port=8082