# 1. Database Connection URL (Points to your local machine on port 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/placement_portal?createDatabaseIfNotExist=true

# 2. Your MySQL Login Credentials
# CHANGE 'root' and 'YOUR_PASSWORD' to match your actual MySQL settings!
spring.datasource.username=root
spring.datasource.password=Laptop

# 3. Hibernate Configuration (Automatically updates tables if we change Java code)
# Change this line
# Change this to 'update'
# spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. Change the server port to avoid conflicts
server.port=8082
# Multipart File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ==========================
# Logging Configuration
# ==========================

logging.level.root=INFO
logging.level.com.placement.portal=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

logging.file.name=logs/placement-portal.log

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

# ==========================================
# File Upload Configuration
# ==========================================

file.upload-dir=uploads
file.upload-dir=uploads/resumes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB